name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run doctor
        run: npm run doctor

      - name: Publish to npm
        # Idempotent: a re-run after the version is already on npm must not halt
        # the job before the ClawHub step. Only a version conflict is tolerated;
        # other publish errors still fail loud.
        run: |
          npm publish --access public 2>err.log || {
            if grep -qiE "cannot publish over|previously published|403" err.log; then
              echo "npm already has this version — continuing to downstream publish"
            else
              cat err.log; exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build OpenClaw format
        run: node compiler/bin/rune.js build --platform openclaw --output .

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges | grep -v "^- chore" | head -15)
          else
            NOTES="- Initial release"
          fi
          # Extract codename from CHANGELOG.md if present
          CODENAME=$(grep -oP "## \[${TAG#v}\].*" CHANGELOG.md | head -1 || echo "")
          # Write to a workspace file (persists across steps in this job). Passing
          # the multi-line notes as a step OUTPUT and inlining it as an expression
          # into a later run block is what broke the release step — a notes FILE
          # avoids all expression interpolation.
          {
            echo "## What's New"
            echo ""
            echo "$NOTES"
            echo ""
            echo "**Full Changelog**: https://github.com/rune-kit/rune/compare/${PREV_TAG}...${TAG}"
          } > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — updating"
            # --draft=false: deleting + recreating a tag detaches its release into an
            # untagged DRAFT; a plain --latest then 422s ("cannot be draft"). Force it published.
            gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md --draft=false --latest
          else
            gh release create "$TAG" --title "$TAG" --notes-file release-notes.md --latest
          fi

      - name: Publish + verify ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          npm install -g clawhub
          # Login must fail LOUD — a revoked/expired token was once swallowed by continue-on-error
          # and left ClawHub stale at an old version for a month with a false green check.
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          CHANGELOG=$(git log "$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')..${TAG}" --pretty=format:"• %s" --no-merges | head -10)
          # CLI v0.23+ refuses `clawhub publish` on folders containing plugin markers
          # (openclaw.plugin.json / src/) — "This looks like a plugin. Use clawhub package
          # publish". Rune's ClawHub listing is Family: Skill, so stage a skills-only copy
          # rather than switching to `package publish` (different family, needs
          # openclaw.compat fields, and may not update the existing Skill listing).
          # Broke the v2.23.0 publish run before this staging step existed.
          STAGE=$(mktemp -d)
          cp -r .openclaw/rune/skills "$STAGE/skills"
          cp .openclaw/rune/SKILL.md .openclaw/rune/README.md "$STAGE/"
          # ClawHub frequently answers "Timeout" while still committing server-side, so its exit
          # code is unreliable. Tolerate it here; the inspect check below is the real gate.
          clawhub publish "$STAGE" \
            --slug rune-kit \
            --name "Rune" \
            --version "$VERSION" \
            --changelog "${CHANGELOG}" || echo "publish returned non-zero (often a benign timeout) — verifying via inspect"
          sleep 5
          # What this gate is for: a revoked token once left ClawHub stale for a month behind a
          # false green check. So the question to ask is "does ClawHub KNOW this version?", not
          # "is it already the latest tag" — ClawHub promotes `latest` only after its LLM
          # moderation pass, which lands hours later (v2.26.0: published 02:04, moderated 02:29;
          # v2.26.1 failed this step 10s after a successful publish). Anchoring on `latest`
          # therefore fails every first publish and taught us to ignore a red release run.
          #
          # `clawhub inspect` prints "latest=X.Y.Z" (and "Latest  X.Y.Z"), not "latest:" — the
          # colon-anchored grep before this one returned none and false-failed a good publish.
          INSPECT=$(clawhub inspect rune-kit 2>&1 || true)
          LATEST=$(printf '%s' "$INSPECT" | grep -iE "latest" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1)
          # A re-publish of a version ClawHub already accepted is refused by name — the most
          # direct proof the upload landed, and it works while moderation is still pending.
          REPUBLISH=$(clawhub publish "$STAGE" --slug rune-kit --name "Rune" --version "$VERSION" 2>&1 || true)
          echo "ClawHub latest: ${LATEST:-none} (this release: ${VERSION})"
          if [ "$LATEST" = "$VERSION" ]; then
            echo "✅ ClawHub verified at ${VERSION} (latest tag promoted)"
          elif printf '%s' "$REPUBLISH" | grep -qiE "already exists"; then
            echo "::notice::ClawHub accepted ${VERSION}; latest is still ${LATEST:-none} pending moderation. Not a failure."
          else
            echo "::error::ClawHub does NOT have ${VERSION} (latest=${LATEST:-none}) — token likely invalid/revoked. This check exists so the ✓ can never lie again."
            printf '%s\n' "$REPUBLISH" | tail -5
            exit 1
          fi

      - name: Summary
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "## Published ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ npm: @rune-kit/rune@${TAG#v}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub Release: ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ClawHub: rune-kit@${TAG#v}" >> $GITHUB_STEP_SUMMARY
