name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run doctor
        run: npm run doctor

      - name: Publish to npm
        # Idempotent: a re-run after the version is already on npm must not halt
        # the job before the ClawHub step. Only a version conflict is tolerated;
        # other publish errors still fail loud.
        run: |
          npm publish --access public 2>err.log || {
            if grep -qiE "cannot publish over|previously published|403" err.log; then
              echo "npm already has this version — continuing to downstream publish"
            else
              cat err.log; exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build OpenClaw format
        run: node compiler/bin/rune.js build --platform openclaw --output .

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges | grep -v "^- chore" | head -15)
          else
            NOTES="- Initial release"
          fi
          # Extract codename from CHANGELOG.md if present
          CODENAME=$(grep -oP "## \[${TAG#v}\].*" CHANGELOG.md | head -1 || echo "")
          {
            echo "notes<<CHANGELOG_EOF"
            echo "## What's New"
            echo ""
            echo "$NOTES"
            echo ""
            echo "**Full Changelog**: https://github.com/rune-kit/rune/compare/${PREV_TAG}...${TAG}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Write notes to a file — inlining the multi-line ${{ }} value into the
          # gh command line breaks arg parsing ("accepts 1 arg(s), received 2")
          # when the release-edit path runs. --notes-file sidesteps it entirely.
          cat > "$RUNNER_TEMP/relnotes.md" <<'NOTES_EOF'
          ${{ steps.changelog.outputs.notes }}
          NOTES_EOF
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — updating"
            gh release edit "$TAG" --title "$TAG" --notes-file "$RUNNER_TEMP/relnotes.md" --latest
          else
            gh release create "$TAG" --title "$TAG" --notes-file "$RUNNER_TEMP/relnotes.md" --latest
          fi

      - name: Publish + verify ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          npm install -g clawhub
          # Login must fail LOUD — a revoked/expired token was once swallowed by continue-on-error
          # and left ClawHub stale at an old version for a month with a false green check.
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          CHANGELOG=$(git log "$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')..${TAG}" --pretty=format:"• %s" --no-merges | head -10)
          # CLI v0.23+ refuses `clawhub publish` on folders containing plugin markers
          # (openclaw.plugin.json / src/) — "This looks like a plugin. Use clawhub package
          # publish". Rune's ClawHub listing is Family: Skill, so stage a skills-only copy
          # rather than switching to `package publish` (different family, needs
          # openclaw.compat fields, and may not update the existing Skill listing).
          # Broke the v2.23.0 publish run before this staging step existed.
          STAGE=$(mktemp -d)
          cp -r .openclaw/rune/skills "$STAGE/skills"
          cp .openclaw/rune/SKILL.md .openclaw/rune/README.md "$STAGE/"
          # ClawHub frequently answers "Timeout" while still committing server-side, so its exit
          # code is unreliable. Tolerate it here; the inspect check below is the real gate.
          clawhub publish "$STAGE" \
            --slug rune-kit \
            --name "Rune" \
            --version "$VERSION" \
            --changelog "${CHANGELOG}" || echo "publish returned non-zero (often a benign timeout) — verifying via inspect"
          sleep 5
          LATEST=$(clawhub inspect rune-kit 2>&1 | grep -i "latest:" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1)
          echo "ClawHub latest after publish: ${LATEST:-none} (expected ${VERSION})"
          if [ "$LATEST" != "$VERSION" ]; then
            echo "::error::ClawHub did NOT land ${VERSION} (latest=${LATEST:-none}) — token likely invalid/revoked. This check exists so the ✓ can never lie again."
            exit 1
          fi
          echo "✅ ClawHub verified at ${VERSION}"

      - name: Summary
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "## Published ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ npm: @rune-kit/rune@${TAG#v}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub Release: ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ClawHub: rune-kit@${TAG#v}" >> $GITHUB_STEP_SUMMARY
