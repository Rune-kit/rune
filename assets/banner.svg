<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1419"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pulse-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Mesh grid background (subtle) -->
  <g stroke="#1a2a35" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/>
  </g>

  <!-- ============================================ -->
  <!-- LEFT: Branding + Tagline                     -->
  <!-- ============================================ -->
  <g transform="translate(60, 80)">
    <!-- Diamond logo -->
    <g filter="url(#glow)">
      <polygon points="24,0 48,24 24,48 0,24" fill="#10b981" opacity="0.9"/>
      <polygon points="24,8 40,24 24,40 8,24" fill="#0c1419" opacity="0.5"/>
    </g>
    <!-- Title -->
    <text x="62" y="20" font-family="'Space Grotesk', 'SF Pro', system-ui, sans-serif" font-size="42" font-weight="700" fill="#f0fdf4" letter-spacing="-1">Rune</text>
    <text x="62" y="48" font-family="'Inter', 'SF Pro', system-ui, sans-serif" font-size="14" fill="#6ee7b7" letter-spacing="3" font-weight="500">SKILL MESH</text>

    <!-- Tagline -->
    <text x="0" y="100" font-family="'Space Grotesk', 'SF Pro', system-ui, sans-serif" font-size="22" font-weight="600" fill="#e2e8f0">Less skills. Deeper connections.</text>

    <!-- Stats row -->
    <g transform="translate(0, 135)">
      <text font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="13">
        <tspan fill="#10b981" font-weight="700">58</tspan><tspan fill="#64748b"> skills</tspan>
        <tspan fill="#334155"> · </tspan>
        <tspan fill="#10b981" font-weight="700">200+</tspan><tspan fill="#64748b"> connections</tspan>
        <tspan fill="#334155"> · </tspan>
        <tspan fill="#10b981" font-weight="700">8</tspan><tspan fill="#64748b"> platforms</tspan>
        <tspan fill="#334155"> · </tspan>
        <tspan fill="#10b981" font-weight="700">MIT</tspan>
      </text>
    </g>

    <!-- Install command -->
    <g transform="translate(0, 170)">
      <rect x="0" y="0" width="320" height="32" rx="6" fill="#1a2332" stroke="#2a3f52" stroke-width="1"/>
      <text x="12" y="21" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="12">
        <tspan fill="#64748b">$</tspan><tspan fill="#e2e8f0"> npx @rune-kit/rune init</tspan>
      </text>
      <!-- Blinking cursor -->
      <rect x="268" y="10" width="6" height="13" rx="1" fill="#10b981" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- RIGHT: Animated Mesh Flow Visualization      -->
  <!-- cook → ba → plan (real workflow)             -->
  <!-- ============================================ -->
  <g transform="translate(560, 40)">

    <!-- ── Mesh connection lines (drawn first, behind nodes) ── -->

    <!-- cook → ba (L1 → L2) -->
    <line x1="200" y1="80" x2="120" y2="160" stroke="#2a3f52" stroke-width="1.5" stroke-dasharray="4,4"/>
    <!-- Animated pulse: cook → ba -->
    <circle r="3" fill="#10b981" filter="url(#glow-sm)">
      <animateMotion dur="3s" repeatCount="indefinite" begin="0s">
        <mpath href="#path-cook-ba"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.05;0.3;0.35;0.5;1" dur="3s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <path id="path-cook-ba" d="M200,80 L120,160" fill="none" stroke="none"/>

    <!-- cook → scout (L1 → L2) -->
    <line x1="200" y1="80" x2="310" y2="160" stroke="#2a3f52" stroke-width="1.5" stroke-dasharray="4,4"/>
    <!-- Animated pulse: cook → scout -->
    <circle r="3" fill="#10b981" filter="url(#glow-sm)">
      <animateMotion dur="3s" repeatCount="indefinite" begin="0.2s">
        <mpath href="#path-cook-scout"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.05;0.3;0.35;0.5;1" dur="3s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <path id="path-cook-scout" d="M200,80 L310,160" fill="none" stroke="none"/>

    <!-- ba → plan (L2 → L2) -->
    <line x1="120" y1="160" x2="200" y2="240" stroke="#2a3f52" stroke-width="1.5" stroke-dasharray="4,4"/>
    <!-- Animated pulse: ba → plan -->
    <circle r="3" fill="#6ee7b7" filter="url(#glow-sm)">
      <animateMotion dur="3s" repeatCount="indefinite" begin="1s">
        <mpath href="#path-ba-plan"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.33;0.38;0.63;0.68;1" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <path id="path-ba-plan" d="M120,160 L200,240" fill="none" stroke="none"/>

    <!-- scout → plan (L2 → L2) -->
    <line x1="310" y1="160" x2="200" y2="240" stroke="#2a3f52" stroke-width="1.5" stroke-dasharray="4,4"/>
    <!-- Animated pulse: scout → plan -->
    <circle r="3" fill="#6ee7b7" filter="url(#glow-sm)">
      <animateMotion dur="3s" repeatCount="indefinite" begin="1.2s">
        <mpath href="#path-scout-plan"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.33;0.38;0.63;0.68;1" dur="3s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <path id="path-scout-plan" d="M310,160 L200,240" fill="none" stroke="none"/>

    <!-- plan → test (L2 → L2) -->
    <line x1="200" y1="240" x2="120" y2="310" stroke="#2a3f52" stroke-width="1.5" stroke-dasharray="4,4"/>
    <circle r="3" fill="#34d399" filter="url(#glow-sm)">
      <animateMotion dur="3s" repeatCount="indefinite" begin="2s">
        <mpath href="#path-plan-test"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.66;0.71;0.9;0.95;1" dur="3s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <path id="path-plan-test" d="M200,240 L120,310" fill="none" stroke="none"/>

    <!-- plan → fix (L2 → L2) -->
    <line x1="200" y1="240" x2="280" y2="310" stroke="#2a3f52" stroke-width="1.5" stroke-dasharray="4,4"/>
    <circle r="3" fill="#34d399" filter="url(#glow-sm)">
      <animateMotion dur="3s" repeatCount="indefinite" begin="2.2s">
        <mpath href="#path-plan-fix"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.66;0.71;0.9;0.95;1" dur="3s" repeatCount="indefinite" begin="2.2s"/>
    </circle>
    <path id="path-plan-fix" d="M200,240 L280,310" fill="none" stroke="none"/>

    <!-- Cross-mesh connections (secondary) -->
    <line x1="120" y1="160" x2="310" y2="160" stroke="#1e3a4a" stroke-width="1" stroke-dasharray="2,6" opacity="0.5"/>
    <line x1="120" y1="310" x2="280" y2="310" stroke="#1e3a4a" stroke-width="1" stroke-dasharray="2,6" opacity="0.5"/>

    <!-- Side connections to background nodes -->
    <line x1="50" y1="100" x2="120" y2="160" stroke="#1e3a4a" stroke-width="1" opacity="0.3"/>
    <line x1="380" y1="100" x2="310" y2="160" stroke="#1e3a4a" stroke-width="1" opacity="0.3"/>
    <line x1="50" y1="280" x2="120" y2="310" stroke="#1e3a4a" stroke-width="1" opacity="0.3"/>
    <line x1="380" y1="280" x2="280" y2="310" stroke="#1e3a4a" stroke-width="1" opacity="0.3"/>
    <line x1="420" y1="200" x2="310" y2="160" stroke="#1e3a4a" stroke-width="1" opacity="0.3"/>

    <!-- Background nodes (ambient mesh) -->
    <circle cx="50" cy="100" r="4" fill="#1a2a35" stroke="#2a3f52" stroke-width="1"/>
    <circle cx="380" cy="100" r="4" fill="#1a2a35" stroke="#2a3f52" stroke-width="1"/>
    <circle cx="50" cy="280" r="4" fill="#1a2a35" stroke="#2a3f52" stroke-width="1"/>
    <circle cx="380" cy="280" r="4" fill="#1a2a35" stroke="#2a3f52" stroke-width="1"/>
    <circle cx="420" cy="200" r="4" fill="#1a2a35" stroke="#2a3f52" stroke-width="1"/>
    <circle cx="440" cy="140" r="3" fill="#1a2a35" stroke="#2a3f52" stroke-width="0.5" opacity="0.5"/>
    <circle cx="460" cy="260" r="3" fill="#1a2a35" stroke="#2a3f52" stroke-width="0.5" opacity="0.5"/>
    <line x1="420" y1="200" x2="440" y2="140" stroke="#1e3a4a" stroke-width="0.5" opacity="0.2"/>
    <line x1="420" y1="200" x2="460" y2="260" stroke="#1e3a4a" stroke-width="0.5" opacity="0.2"/>

    <!-- ── Skill Nodes ── -->

    <!-- L1: cook (orchestrator) — top -->
    <g transform="translate(200, 80)">
      <circle r="28" fill="#0c1419" stroke="#10b981" stroke-width="2" filter="url(#glow)">
        <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text y="-6" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#10b981">cook</text>
      <text y="8" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748b">L1</text>
    </g>

    <!-- L2: ba — left middle -->
    <g transform="translate(120, 160)">
      <circle r="24" fill="#0c1419" stroke="#6ee7b7" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="1s"/>
      </circle>
      <text y="-5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#6ee7b7">ba</text>
      <text y="8" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748b">L2</text>
    </g>

    <!-- L2: scout — right middle -->
    <g transform="translate(310, 160)">
      <circle r="24" fill="#0c1419" stroke="#6ee7b7" stroke-width="1.5">
        <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="1.2s"/>
      </circle>
      <text y="-5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#6ee7b7">scout</text>
      <text y="8" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748b">L2</text>
    </g>

    <!-- L2: plan — center -->
    <g transform="translate(200, 240)">
      <circle r="26" fill="#0c1419" stroke="#34d399" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="2s"/>
      </circle>
      <text y="-5" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#34d399">plan</text>
      <text y="8" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#64748b">L2</text>
    </g>

    <!-- L2: test — bottom left -->
    <g transform="translate(120, 310)">
      <circle r="20" fill="#0c1419" stroke="#a7f3d0" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite" begin="2.5s"/>
      </circle>
      <text y="-4" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700" fill="#a7f3d0">test</text>
      <text y="8" text-anchor="middle" font-family="'Inter', sans-serif" font-size="7" fill="#64748b">L2</text>
    </g>

    <!-- L2: fix — bottom right -->
    <g transform="translate(280, 310)">
      <circle r="20" fill="#0c1419" stroke="#a7f3d0" stroke-width="1">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite" begin="2.7s"/>
      </circle>
      <text y="-4" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="700" fill="#a7f3d0">fix</text>
      <text y="8" text-anchor="middle" font-family="'Inter', sans-serif" font-size="7" fill="#64748b">L2</text>
    </g>

    <!-- ── Flow labels (animated) ── -->
    <g font-family="'Inter', sans-serif" font-size="9" fill="#4ade80">
      <!-- Phase 1: UNDERSTAND -->
      <text x="140" y="115" opacity="0">
        Phase 1: UNDERSTAND
        <animate attributeName="opacity" values="0;0;0.8;0.8;0;0" keyTimes="0;0.05;0.1;0.3;0.35;1" dur="6s" repeatCount="indefinite"/>
      </text>
      <!-- Phase 2: PLAN -->
      <text x="160" y="205" opacity="0">
        Phase 2: PLAN
        <animate attributeName="opacity" values="0;0;0.8;0.8;0;0" keyTimes="0;0.35;0.4;0.6;0.65;1" dur="6s" repeatCount="indefinite"/>
      </text>
      <!-- Phase 3-4: BUILD -->
      <text x="155" y="285" opacity="0">
        Phase 3-4: BUILD
        <animate attributeName="opacity" values="0;0;0.8;0.8;0;0" keyTimes="0;0.65;0.7;0.9;0.95;1" dur="6s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Layer legend -->
    <g transform="translate(500, 65)">
      <text font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#475569">LAYER</text>
      <g transform="translate(0, 18)">
        <circle r="5" cx="5" cy="0" fill="none" stroke="#10b981" stroke-width="1.5"/>
        <text x="16" y="4" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">L1 Orchestrator</text>
      </g>
      <g transform="translate(0, 38)">
        <circle r="5" cx="5" cy="0" fill="none" stroke="#6ee7b7" stroke-width="1.5"/>
        <text x="16" y="4" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">L2 Workflow</text>
      </g>
      <g transform="translate(0, 58)">
        <circle r="5" cx="5" cy="0" fill="none" stroke="#a7f3d0" stroke-width="1"/>
        <text x="16" y="4" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">L3 Utility</text>
      </g>
      <g transform="translate(0, 86)">
        <line x1="0" y1="0" x2="20" y2="0" stroke="#2a3f52" stroke-width="1.5" stroke-dasharray="4,4"/>
        <text x="28" y="4" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">Mesh link</text>
      </g>
      <g transform="translate(0, 106)">
        <circle r="3" cx="10" cy="0" fill="#10b981" filter="url(#glow-sm)"/>
        <text x="28" y="4" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">Data flow</text>
      </g>
    </g>

    <!-- Animated workflow text -->
    <g transform="translate(500, 220)">
      <rect x="-8" y="-16" width="200" height="110" rx="8" fill="#0d1520" stroke="#1e3a4a" stroke-width="1" opacity="0.8"/>
      <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">Workflow:</text>

      <!-- Step 1 -->
      <text x="0" y="22" font-family="'JetBrains Mono', monospace" font-size="11" opacity="0">
        <tspan fill="#10b981">cook</tspan><tspan fill="#475569"> → </tspan><tspan fill="#6ee7b7">ba</tspan><tspan fill="#475569"> + </tspan><tspan fill="#6ee7b7">scout</tspan>
        <animate attributeName="opacity" values="0;1;1;0.5;0.5" keyTimes="0;0.1;0.3;0.35;1" dur="6s" repeatCount="indefinite"/>
      </text>
      <!-- Step 2 -->
      <text x="0" y="44" font-family="'JetBrains Mono', monospace" font-size="11" opacity="0">
        <tspan fill="#6ee7b7">ba</tspan><tspan fill="#475569"> + </tspan><tspan fill="#6ee7b7">scout</tspan><tspan fill="#475569"> → </tspan><tspan fill="#34d399">plan</tspan>
        <animate attributeName="opacity" values="0;0;1;1;0.5" keyTimes="0;0.3;0.4;0.6;0.65" dur="6s" repeatCount="indefinite"/>
      </text>
      <!-- Step 3 -->
      <text x="0" y="66" font-family="'JetBrains Mono', monospace" font-size="11" opacity="0">
        <tspan fill="#34d399">plan</tspan><tspan fill="#475569"> → </tspan><tspan fill="#a7f3d0">test</tspan><tspan fill="#475569"> + </tspan><tspan fill="#a7f3d0">fix</tspan>
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.6;0.7;0.9;1" dur="6s" repeatCount="indefinite"/>
      </text>
      <!-- Checkmark -->
      <text x="0" y="88" font-family="'JetBrains Mono', monospace" font-size="11" opacity="0">
        <tspan fill="#10b981">&#10003;</tspan><tspan fill="#94a3b8"> Feature shipped</tspan>
        <animate attributeName="opacity" values="0;0;0;1;0" keyTimes="0;0.85;0.9;0.95;1" dur="6s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="398" width="1280" height="2" fill="url(#accent)"/>
</svg>
